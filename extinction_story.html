<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DinoCuentos: El Gran Cambio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        jungle: '#4ade80',
                        sky: '#38bdf8',
                        sun: '#fde047',
                        earth: '#a16207',
                    },
                    fontFamily: {
                        'heading': ['"Fredoka One"', 'cursive'],
                    }
                }
            }
        }
    </script>

    <style>
        body { user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        @keyframes breathe { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.05) rotate(2deg); } }
        @keyframes pulse-btn { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(253,224,71,0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(253,224,71,0); } 100% { transform: scale(1); } }
        @keyframes float-cloud { 0% { transform: translateX(0); } 50% { transform: translateX(20px); } 100% { transform: translateX(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-breathe { animation: breathe 3s ease-in-out infinite; }
        .animate-pulse-btn { animation: pulse-btn 2s infinite; }
        .animate-cloud-slow { animation: float-cloud 8s ease-in-out infinite; }
        .animate-cloud-fast { animation: float-cloud 6s ease-in-out infinite reverse; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .fade-out { opacity: 0; transition: opacity 1s ease-out; pointer-events: none; }
        .tree-trunk { background-color: #795548; }
        .tree-leaves { background-color: #2E7D32; border-radius: 50%; }
        @keyframes spin-happy { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-spin-once { animation: spin-happy 0.6s ease-in-out; }
        @keyframes wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }
        .animate-wiggle { animation: wiggle 0.5s ease-in-out; }
        .particle { position: absolute; pointer-events: none; animation: float-up-fade 1s ease-out forwards; font-size: 2rem; }
        @keyframes float-up-fade { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-50px) scale(1.5); opacity: 0; } }
        @keyframes asteroid-float { 0% { transform: translate(0, 0); } 100% { transform: translate(30vw, 30vh); } }
        .animate-asteroid-slow { animation: asteroid-float 20s linear forwards; }
        .animate-asteroid-fall { transition: all 0.8s ease-in; transform: translate(50vw, 120vh) !important; }
        @keyframes shake-screen { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-10px) translateY(5px); } 20%, 40%, 60%, 80% { transform: translateX(10px) translateY(-5px); } }
        .animate-shake { animation: shake-screen 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        .flash-white { position: absolute; inset: 0; background: white; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 1s ease-in; }
        .dino-scared { transform: rotate(-20deg) scale(0.9) !important; transition: all 1s; filter: brightness(0.8) sepia(0.5); }
        .sun-pale { background-color: #fff9c4; box-shadow: 0 0 20px 10px rgba(255,255,255,0.5); }
        .dead-tree { background-color: #4e342e; }
        .fossil-skeleton { filter: drop-shadow(0 0 10px white); transition: all 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        .transform-bird { transform: scale(0.3) translate(200vw, -200vh) rotate(20deg) !important; opacity: 0; }
        .bird-emoji { font-size: 8rem; position: absolute; opacity: 0; transition: all 2s ease-out; transform: scale(0); }
        .bird-fly-away { opacity: 1 !important; transform: scale(1) translate(100vw, -100vh) !important; }
    </style>
</head>
<body class="bg-sky overflow-hidden w-screen h-screen font-heading selection:bg-none">
    <div id="game-container" class="relative w-full h-full max-w-7xl mx-auto overflow-hidden">
        <div id="white-flash" class="flash-white"></div>
        <a href="index.html" class="absolute top-4 left-4 z-50 w-16 h-16 md:w-20 md:h-20 bg-white rounded-full border-4 border-earth flex items-center justify-center text-3xl shadow-xl active:scale-95 no-underline">🏠</a>

        <!-- ESCENA 1: Bienvenida -->
        <div id="scene-1" class="absolute inset-0 w-full h-full flex flex-col transition-opacity duration-1000">
            <div class="absolute inset-0 z-0 pointer-events-none">
                <div class="absolute top-6 right-6 md:top-10 md:right-10 w-24 h-24 bg-sun rounded-full shadow-[0_0_40px_rgba(253,224,71,0.6)] animate-pulse"></div>
                <div class="absolute top-20 left-1/4 w-32 h-16 bg-white rounded-full opacity-80 animate-cloud-slow"></div>
                <div class="absolute top-32 right-1/3 w-24 h-12 bg-white rounded-full opacity-60 animate-cloud-fast"></div>
                <div class="absolute bottom-0 left-0 w-full h-1/3 bg-jungle rounded-t-[50%] scale-110 translate-y-10 border-t-8 border-green-600"></div>
                <div class="absolute bottom-0 right-0 w-2/3 h-1/4 bg-green-600 rounded-t-[100%] translate-y-5 opacity-80"></div>
            </div>
            <div class="relative z-10 w-full h-full flex flex-col items-center justify-center p-4">
                <div class="flex-none mb-4 text-center animate-float mt-16 md:mt-0">
                    <h1 class="text-5xl md:text-8xl text-white drop-shadow-[0_5px_0_rgba(0,0,0,0.2)]">El Gran Cambio</h1>
                </div>
                <div class="flex-1 flex items-center justify-center animate-breathe min-h-0"><div class="text-[120px] md:text-[200px] leading-none filter drop-shadow-2xl">🦕</div></div>
                <div class="flex-none mb-10"><button id="start-btn" class="px-12 py-6 bg-sun text-earth rounded-full border-b-8 border-earth shadow-2xl active:translate-y-2 active:border-b-0 animate-pulse-btn flex items-center gap-4 cursor-pointer"><span class="text-4xl md:text-6xl">EMPEZAR</span><div class="w-0 h-0 border-t-[15px] border-t-transparent border-l-[25px] border-l-earth border-b-[15px] border-b-transparent ml-2"></div></button></div>
            </div>
        </div>

        <!-- ESCENA 2: Selva -->
        <div id="scene-2" class="hidden absolute inset-0 w-full h-full transition-opacity duration-1000">
            <div class="absolute inset-0 bg-gradient-to-b from-sky-300 to-green-100 z-0">
                <div class="absolute bottom-20 left-10 w-24 h-64 tree-trunk rounded-t-lg"></div>
                <div class="absolute bottom-60 left-0 w-48 h-48 tree-leaves shadow-lg"></div>
                <div class="absolute bottom-20 right-20 w-20 h-56 tree-trunk rounded-t-lg"></div>
                <div class="absolute bottom-52 right-4 w-40 h-40 tree-leaves shadow-lg"></div>
                <div class="absolute bottom-0 w-full h-24 bg-green-600 border-t-8 border-green-700"></div>
            </div>
            <div class="absolute inset-0 z-10">
                <div id="dino-fly" class="absolute top-24 right-1/4 text-9xl cursor-pointer animate-float select-none" onclick="interactDino('fly', this)">🦅</div>
                <div id="dino-rex" class="absolute bottom-24 left-10 text-9xl cursor-pointer animate-breathe select-none" onclick="interactDino('rex', this)">🦖</div>
                <div id="dino-diplo" class="absolute bottom-24 right-10 text-9xl cursor-pointer animate-breathe select-none" onclick="interactDino('diplo', this)">🦕</div>
            </div>
            <div id="next-arrow-2" class="hidden absolute bottom-10 right-4 z-50 animate-bounce cursor-pointer" onclick="cargarEscenaAsteroide()"><div class="w-24 h-24 bg-sun rounded-full border-4 border-earth flex items-center justify-center text-5xl shadow-xl">➡️</div></div>
        </div>

        <!-- ESCENA 3: Asteroide -->
        <div id="scene-3" class="hidden absolute inset-0 w-full h-full transition-opacity duration-1000">
            <div class="absolute inset-0 bg-gradient-to-b from-orange-400 to-red-300 z-0">
                <div class="absolute bottom-0 w-full h-24 bg-amber-900 border-t-8 border-amber-950"></div>
            </div>
            <div class="absolute inset-0 z-10">
                <div class="absolute top-24 right-1/4 text-9xl dino-scared">🦅</div>
                <div class="absolute bottom-24 left-10 text-9xl dino-scared">🦖</div>
                <div class="absolute bottom-24 right-10 text-9xl dino-scared">🦕</div>
            </div>
            <div id="asteroid" class="absolute -top-20 -left-20 z-20 cursor-pointer animate-asteroid-slow" onclick="caidaAsteroide()">
                <div class="text-[150px] filter drop-shadow-[0_0_20px_rgba(255,0,0,0.8)] transform rotate-[270deg]">☄️</div>
            </div>
            <div class="absolute top-10 w-full text-center z-10"><p class="text-white text-3xl drop-shadow-md animate-pulse">¡Toca la roca de fuego!</p></div>
        </div>

        <!-- ESCENA 4: Invierno -->
        <div id="scene-4" class="hidden absolute inset-0 w-full h-full transition-opacity duration-1000">
            <!-- Fondo: Imagen de Noche proporcionada por el usuario -->
            <div class="absolute inset-0 z-0">
                <img src="imagenes/noche.png" class="w-full h-full object-cover" alt="Invierno de polvo">
            </div>
            <canvas id="dust-canvas" class="absolute inset-0 z-20 w-full h-full touch-none cursor-crosshair"></canvas>
            <div id="next-arrow-4" class="hidden absolute bottom-10 right-4 z-50 animate-bounce cursor-pointer" onclick="cargarEscenaFosiles()"><div class="w-24 h-24 bg-sun rounded-full border-4 border-earth flex items-center justify-center text-5xl shadow-xl">➡️</div></div>
            <div class="absolute top-10 w-full text-center z-30 pointer-events-none"><p class="text-gray-100 text-3xl drop-shadow-md">¡Limpia el cielo con tu dedo!</p></div>
        </div>

        <!-- ESCENA 5: Fósiles -->
        <div id="scene-5" class="hidden absolute inset-0 w-full h-full transition-opacity duration-1000">
            <div class="absolute inset-0 bg-[#3E2723] z-0 flex items-center justify-center">
                <!-- Esqueleto Fósil (Imagen del usuario) -->
                <div id="fossil-skeleton" class="relative z-10 w-full max-w-4xl h-auto aspect-video flex items-center justify-center fossil-skeleton">
                    <img src="imagenes/fosil.png" class="w-full h-full object-contain" alt="Fósil de dinosaurio">
                </div>
            </div>
            
            <!-- Pajarito (Para transformación final) - Movido fuera del fondo para asegurar visibilidad -->
            <div id="final-bird" class="bird-emoji z-40 left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">🐦</div>

            <canvas id="earth-canvas" class="absolute inset-0 z-20 w-full h-full touch-none cursor-crosshair"></canvas>
            <div id="restart-container" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/50 backdrop-blur-sm">
                <h2 class="text-5xl text-white mb-10">¡Fin de la Historia!</h2>
                <button onclick="location.reload()" class="w-40 h-40 bg-jungle text-white rounded-full border-b-8 border-green-800 text-7xl active:scale-95">🔁</button>
            </div>
            <div id="fossil-hint" class="absolute top-10 w-full text-center z-30 pointer-events-none"><p class="text-amber-200 text-3xl drop-shadow-md">¡Excava con tu dedo!</p></div>
        </div>
    </div>
    <script src="js/story.js"></script>
</body>
</html>
